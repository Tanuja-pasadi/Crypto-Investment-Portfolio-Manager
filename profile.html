{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: center;">
    <div class="glass-card" style="width: 100%; max-width: 600px; margin-top: 40px;">
        <h2 style="margin-bottom: 30px;">Profile Settings</h2>
        
        <form method="POST" action="{{ url_for('profile') }}">
            <div class="form-group">
                <label for="username">Display Name</label>
                <input type="text" id="username" name="username" class="form-control" value="{{ user.username }}" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address (Read-only)</label>
                <input type="email" id="email" class="form-control" value="{{ user.email }}" readonly style="opacity: 0.7;">
            </div>
            
            <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 30px 0;">
            
            <h3 style="margin-bottom: 20px;">System Preferences</h3>
            <div class="form-group">
                <label>Theme</label>
                <select class="form-control">
                    <option value="dark">Dark Theme (Premium)</option>
                    <option value="light" disabled>Light Theme (Coming Soon)</option>
                </select>
            </div>
            
            <button type="submit" class="btn-primary" style="margin-top: 20px;">Save Changes</button>
        </form>
    </div>
</div>
{% endblock %}
